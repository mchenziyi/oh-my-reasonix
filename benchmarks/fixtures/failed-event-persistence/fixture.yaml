  "regression_tests": [],
  "expected_events": ["run_done"],
  "replay_outputs": [
    {"role": "user", "kind": "command", "output": "go build ./..."},
    {"role": "assistant", "kind": "tool_result", "output": "build failed"}
  ],
  "replay": {
    "changed_paths": [],
    "hidden_tests_passed": true,
